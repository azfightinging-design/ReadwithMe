<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>ReadWithMe</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#F5F5DC" />
  <!-- 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: '#F5F5DC',
            parchmentDeep: '#E6E1C5',
            ink: '#262522',
            accent: '#A78BFA',
            accentSoft: 'rgba(167, 139, 250, 0.22)',
            accentStrong: '#7C3AED',
          },
          boxShadow: {
            soft: '0 18px 60px rgba(0,0,0,0.25)',
            subtle: '0 12px 30px rgba(0,0,0,0.12)',
            card: '0 10px 30px rgba(0,0,0,0.16)',
          },
          borderRadius: {
            xl2: '1.4rem',
          },
        },
      },
    };
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Velocity.js -->
  <script src="https://cdn.jsdelivr.net/npm/velocity-animate@2.0/velocity.min.js"></script>

  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #fdfaf0 0, #f5f5dc 40%, #e3dcc1 100%);
      overscroll-behavior-y: contain;
    }
    .serif {
      font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
    }
    /* 主相机区域关闭浏览器手势干扰 */
    #captureArea {
      touch-action: none;
    }
    /* 防止左右晃动 */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
    }
    /* 自定义滚动条（轻量学术感） */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.18);
      border-radius: 999px;
    }
    /* 术语雷达点 */
    .term-dot {
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.9);
      backdrop-filter: blur(6px);
    }
    /* 笔记卡片划动删除 */
    .note-card {
      transition: transform 0.15s ease-out;
      touch-action: pan-y;
    }
  </style>
</head>
<body class="min-h-screen text-ink selection:bg-accentSoft selection:text-ink">

  <!-- 根容器 -->
  <div id="app" class="flex flex-col min-h-screen">
    <!-- 顶部标题栏（相机 / 默认视图） -->
    <header id="topBar" class="flex items-center justify-between px-5 pt-5 pb-3 md:px-8 md:pt-6">
      <div>
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-black/5 border border-black/5 backdrop-blur">
          <span class="w-1.5 h-1.5 rounded-full bg-accentStrong animate-pulse"></span>
          <span class="text-[11px] uppercase tracking-[0.18em] text-ink/70">ReadWithMe · Beta</span>
        </div>
        <div class="mt-2 leading-tight">
          <p class="serif text-[21px] font-semibold tracking-tight text-ink">和书页一起，慢一点读。</p>
          <p class="mt-0.5 text-xs text-ink/70">对准正在读的那一页，按下快门。</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button id="infoButton" class="hidden md:inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-black/10 bg-white/40 shadow-subtle text-xs text-ink/70 hover:bg-white/70 transition">
          <i data-lucide="info" class="w-3.5 h-3.5"></i>
          <span>使用提示</span>
        </button>
        <button class="inline-flex items-center justify-center w-9 h-9 rounded-full border border-black/5 bg-white/60 shadow-subtle hover:bg-white transition">
          <i data-lucide="sparkles" class="w-4 h-4 text-accentStrong"></i>
        </button>
      </div>
    </header>

    <!-- 主视图区域 -->
    <main class="flex-1 flex flex-col pb-24">

      <!-- 摄像 / 截图视图 -->
      <section id="cameraView" class="flex-1 flex flex-col px-4 pb-3 md:px-8">
        <div id="captureArea" class="relative flex-1 rounded-xl2 bg-black/60 overflow-hidden shadow-soft border border-black/30">
          <!-- 实时相机画面 -->
          <video id="cameraVideo" class="w-full h-full object-cover" autoplay playsinline muted></video>

          <!-- 截图画布 -->
          <canvas id="captureCanvas" class="absolute inset-0 w-full h-full object-contain hidden bg-black"></canvas>

          <!-- 暗角和渐变遮罩，提升质感 -->
          <div class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_center,_rgba(255,255,255,0.08)_0,_transparent_55%),radial-gradient(circle_at_top,_rgba(255,255,255,0.14)_0,_transparent_60%)] mix-blend-screen"></div>
          <div class="absolute inset-x-0 bottom-0 h-40 bg-gradient-to-t from-black/55 via-black/15 to-transparent pointer-events-none"></div>

          <!-- 术语雷达点容器（截图后出现） -->
          <div id="termRadarLayer" class="absolute inset-0 pointer-events-none hidden"></div>

          <!-- 划线选择层（截图后） -->
          <div id="selectionLayer" class="absolute inset-0 hidden">
            <div id="selectionRect" class="absolute border border-accentStrong/70 bg-accentSoft/70 rounded-lg hidden"></div>
            <!-- 长按菜单 -->
            <div id="selectionMenu" class="absolute hidden z-30">
              <div class="flex items-center rounded-full bg-ink/98 text-xs text-white shadow-card overflow-hidden border border-white/10">
                <button id="menuAnalyze" class="px-3 py-1.5 hover:bg-white/10">分析</button>
                <div class="w-px h-4 bg-white/15"></div>
                <button id="menuExpand" class="px-3 py-1.5 hover:bg-white/10">发散</button>
              </div>
            </div>
          </div>

          <!-- 居中的对准辅助线 -->
          <div class="pointer-events-none absolute inset-0 flex items-center justify-center">
            <div class="w-[72%] max-w-sm aspect-[3/4] border border-white/45 rounded-xl2 shadow-[0_0_0_1px_rgba(0,0,0,0.4)]"></div>
          </div>

          <!-- 顶部小标签：相机权限状态 -->
          <div class="absolute left-3 top-3">
            <span id="cameraStatus" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-black/50 text-[10px] text-white/85 backdrop-blur shadow-subtle">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
              <span>正在请求相机访问…</span>
            </span>
          </div>
        </div>
      </section>

      <!-- 书架视图 -->
      <section id="libraryView" class="hidden flex-1 flex-col px-4 pb-4 md:px-8">
        <div class="flex items-center justify-between mb-2 mt-1">
          <button id="libraryBack" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-black/10 bg-white/70 text-xs text-ink/80 shadow-subtle">
            <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i>
            <span>返回阅读相机</span>
          </button>
          <div class="flex flex-col items-end">
            <p class="serif text-[18px] font-semibold text-ink leading-none">我的书架</p>
            <p class="text-[11px] text-ink/60 mt-0.5">为每本书自动生成导图</p>
          </div>
        </div>

        <!-- 上传条目 -->
        <div class="mt-3 mb-3">
          <label for="fileInput" class="flex items-center justify-center gap-2 w-full py-3 rounded-xl2 border border-dashed border-ink/25 bg-parchmentDeep/40 text-sm text-ink/80 cursor-pointer hover:border-ink/50 hover:bg-parchmentDeep/70 transition">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span>上传新书（仅支持 PDF / EPUB）</span>
          </label>
          <input id="fileInput" type="file" accept=".pdf,.epub" class="hidden" />
          <p class="mt-1 text-[11px] text-ink/55">文件仅存储在本机浏览器中，不会上传到任何服务器。</p>
        </div>

        <!-- 上传进度 -->
        <div id="uploadProgressContainer" class="hidden mb-3">
          <div class="flex items-center justify-between text-xs text-ink/70 mb-1.5">
            <span id="uploadFileName"></span>
            <span id="uploadPercent">0%</span>
          </div>
          <div class="h-2 w-full rounded-full bg-black/10 overflow-hidden">
            <div id="uploadBar" class="h-full w-0 rounded-full bg-accentStrong transition-[width] duration-200"></div>
          </div>
          <div class="mt-2 flex justify-end">
            <button id="uploadCancel" class="text-xs text-red-500 hover:underline">取消上传</button>
          </div>
        </div>

        <!-- 书籍列表 -->
        <div id="bookList" class="flex-1 overflow-y-auto pb-2 space-y-3 mt-1">
          <!-- 动态注入 -->
          <p id="emptyBookHint" class="text-xs text-ink/50 mt-4 text-center">还没有书籍。先上传一本你正在读的书吧。</p>
        </div>
      </section>

      <!-- 笔记本视图 -->
      <section id="notebookView" class="hidden flex-1 flex-col px-4 pb-4 md:px-8">
        <div class="flex items-center justify-between mb-2 mt-1">
          <button id="notebookBack" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-black/10 bg-white/70 text-xs text-ink/80 shadow-subtle">
            <i data-lucide="chevron-left" class="w-3.5 h-3.5"></i>
            <span>返回阅读相机</span>
          </button>
          <div class="flex flex-col items-end">
            <p class="serif text-[18px] font-semibold text-ink leading-none">阅读笔记本</p>
            <p class="text-[11px] text-ink/60 mt-0.5">每一条都是一张知识卡片</p>
          </div>
        </div>

        <!-- 筛选 -->
        <div class="mt-2 mb-3 flex items-center gap-2">
          <div class="flex-1">
            <label class="text-[11px] text-ink/60 mb-0.5 block">按书籍筛选</label>
            <select id="noteFilterSelect" class="w-full px-3 py-2 rounded-xl2 border border-black/10 bg-white/80 text-xs text-ink/80 focus:outline-none focus:ring-1 focus:ring-accentStrong/50">
              <option value="__all__">全部书籍</option>
            </select>
          </div>
          <button id="clearNotesButton" class="mt-4 inline-flex items-center gap-1 px-3 py-1.5 rounded-full border border-black/10 bg-white/70 text-[11px] text-ink/70 hover:bg-red-50 hover:border-red-300 hover:text-red-600 transition">
            <i data-lucide="eraser" class="w-3.5 h-3.5"></i>
            <span>清空全部</span>
          </button>
        </div>

        <!-- 笔记列表 -->
        <div id="noteList" class="flex-1 overflow-y-auto space-y-3 pb-2">
          <p id="emptyNoteHint" class="text-xs text-ink/50 mt-4 text-center">还没有笔记。去拍一页书并点击「收藏」吧。</p>
        </div>
      </section>
    </main>

    <!-- 底部工具栏 -->
    <nav id="bottomBar" class="fixed inset-x-0 bottom-0 pb-4 md:pb-6 pointer-events-none">
      <div class="mx-4 md:mx-12 rounded-3xl bg-black/70 shadow-soft border border-white/10 px-5 py-3.5 flex items-center justify-between text-white pointer-events-auto backdrop-blur-xl">
        <!-- 左：书架 -->
        <button id="shelfButton" class="flex flex-col items-center gap-1 text-[10px] tracking-wide uppercase">
          <div class="relative flex items-center justify-center w-10 h-10 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition">
            <i data-lucide="library" class="w-4 h-4"></i>
          </div>
          <span class="opacity-80">书架</span>
        </button>

        <!-- 中：相机主按钮 / 分状态 -->
        <div class="flex flex-col items-center gap-2">
          <!-- 初始态：拍摄大圆钮 -->
          <button id="captureButton" class="relative flex items-center justify-center w-16 h-16 rounded-full bg-white shadow-[0_0_0_4px_rgba(0,0,0,0.5)] hover:scale-[1.03] active:scale-[0.96] transition-transform">
            <div class="w-12 h-12 rounded-full border-4 border-ink/80 bg-parchment"></div>
          </button>

          <!-- 截图后：操作按钮组 -->
          <div id="postCaptureActions" class="hidden flex items-center gap-4 text-xs">
            <button id="retakeButton" class="flex items-center gap-1 text-white/70 hover:text-white">
              <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
              <span>重拍</span>
            </button>
            <button id="whatThisPageButton" class="relative inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-accentStrong shadow-subtle text-[11px] font-medium tracking-[0.12em] uppercase">
              <span class="absolute inset-0 rounded-full bg-white/15 blur-md"></span>
              <span class="relative flex items-center gap-1">
                <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                <span>这页讲了啥</span>
              </span>
            </button>
          </div>
        </div>

        <!-- 右：笔记本 -->
        <button id="notebookButton" class="flex flex-col items-center gap-1 text-[10px] tracking-wide uppercase">
          <div class="relative flex items-center justify-center w-10 h-10 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition">
            <i data-lucide="notebook-text" class="w-4 h-4"></i>
            <span id="noteBadge" class="absolute -top-1 -right-1 min-w-[16px] h-4 px-1 rounded-full bg-accentStrong text-[10px] leading-4 text-center hidden"></span>
          </div>
          <span class="opacity-80">笔记本</span>
        </button>
      </div>
    </nav>

    <!-- 抽屉：底部分析 / 发散 / 页摘要 -->
    <div id="drawerBackdrop" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 hidden"></div>
    <aside id="drawerPanel" class="fixed inset-x-0 bottom-0 z-50 translate-y-full opacity-0">
      <div class="mx-0 md:mx-auto md:max-w-xl rounded-t-3xl bg-parchment shadow-soft border border-black/10 border-b-0 pt-3 pb-6 px-4 md:px-6">
        <div class="flex items-center justify-between mb-3">
          <div>
            <p id="drawerTitle" class="serif text-[17px] font-semibold text-ink leading-tight"></p>
            <p id="drawerSubTitle" class="text-[11px] text-ink/60 mt-0.5"></p>
          </div>
          <div class="flex items-center gap-2">
            <button id="drawerFavoriteButton" class="inline-flex items-center gap-1 px-2.5 py-1.5 rounded-full border border-ink/10 bg-white/70 text-[11px] text-ink/80 shadow-subtle hover:bg-white transition">
              <i data-lucide="bookmark-plus" class="w-3.5 h-3.5 text-accentStrong"></i>
              <span>收藏</span>
            </button>
            <button id="drawerClose" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-black/5 hover:bg-black/10">
              <i data-lucide="x" class="w-4 h-4 text-ink/80"></i>
            </button>
          </div>
        </div>
        <div id="drawerMeta" class="flex items-center justify-between text-[11px] text-ink/60 mb-2">
          <span id="drawerBookName"></span>
          <span id="drawerTimestamp"></span>
        </div>
        <div class="h-px w-full bg-gradient-to-r from-transparent via-black/10 to-transparent mb-3"></div>
        <div id="drawerContent" class="serif text-[13px] leading-[1.6] text-ink/90 max-h-[45vh] overflow-y-auto pr-1"></div>
      </div>
    </aside>

    <!-- 模态：术语释义 -->
    <div id="termTooltip" class="fixed z-40 px-3 py-2 rounded-2xl bg-ink/95 text-[11px] text-white max-w-xs shadow-card hidden">
      <p id="termTitle" class="font-medium mb-0.5"></p>
      <p id="termBody" class="opacity-90"></p>
    </div>

    <!-- 模态：导图全屏 -->
    <div id="mindmapOverlay" class="fixed inset-0 z-40 hidden bg-black/70 backdrop-blur-sm flex flex-col">
      <div class="flex items-center justify-between px-5 pt-5 pb-2 text-white">
        <div>
          <p id="mindmapTitle" class="serif text-[18px] font-semibold leading-tight"></p>
          <p class="text-[11px] text-white/70 mt-0.5">自动生成的逻辑导图（示意）</p>
        </div>
        <button id="mindmapClose" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-white/10 hover:bg-white/20">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div class="flex-1 flex items-center justify-center px-4 pb-8">
        <svg id="mindmapSvg" class="w-full max-w-xl aspect-square bg-parchmentDeep/30 rounded-3xl shadow-card border border-white/20" viewBox="0 0 400 400">
          <defs>
            <radialGradient id="nodeGrad" cx="50%" cy="50%" r="65%">
              <stop offset="0%" stop-color="#F5F5DC"/>
              <stop offset="100%" stop-color="#E2D9BC"/>
            </radialGradient>
          </defs>
          <circle cx="200" cy="200" r="72" fill="url(#nodeGrad)" stroke="#7C3AED" stroke-width="1.5" />
          <text x="200" y="190" text-anchor="middle" font-size="14" fill="#262522" font-family="Noto Serif SC">本书核心</text>
          <text x="200" y="210" text-anchor="middle" font-size="10" fill="#555" font-family="Inter">结构·论点·脉络</text>

          <!-- 分支 -->
          <g stroke="#7C3AED" stroke-width="1.3" stroke-linecap="round">
            <line x1="260" y1="190" x2="320" y2="150"/>
            <line x1="260" y1="210" x2="330" y2="230"/>
            <line x1="140" y1="190" x2="80" y2="150"/>
            <line x1="140" y1="215" x2="70" y2="250"/>
            <line x1="200" y1="272" x2="200" y2="332"/>
          </g>

          <!-- 子节点 -->
          <g>
            <circle cx="325" cy="145" r="26" fill="url(#nodeGrad)" stroke="#C4B28A" stroke-width="1.2"/>
            <text x="325" y="142" text-anchor="middle" font-size="10" fill="#262522" font-family="Noto Serif SC">概念层</text>
            <text x="325" y="154" text-anchor="middle" font-size="8" fill="#777" font-family="Inter">关键词·术语</text>

            <circle cx="335" cy="235" r="26" fill="url(#nodeGrad)" stroke="#C4B28A" stroke-width="1.2"/>
            <text x="335" y="232" text-anchor="middle" font-size="10" fill="#262522" font-family="Noto Serif SC">论证链</text>
            <text x="335" y="244" text-anchor="middle" font-size="8" fill="#777" font-family="Inter">证据·推理</text>

            <circle cx="75" cy="145" r="26" fill="url(#nodeGrad)" stroke="#C4B28A" stroke-width="1.2"/>
            <text x="75" y="142" text-anchor="middle" font-size="10" fill="#262522" font-family="Noto Serif SC">结构骨架</text>
            <text x="75" y="154" text-anchor="middle" font-size="8" fill="#777" font-family="Inter">章节·层级</text>

            <circle cx="65" cy="255" r="26" fill="url(#nodeGrad)" stroke="#C4B28A" stroke-width="1.2"/>
            <text x="65" y="252" text-anchor="middle" font-size="10" fill="#262522" font-family="Noto Serif SC">应用场景</text>
            <text x="65" y="264" text-anchor="middle" font-size="8" fill="#777" font-family="Inter">迁移·实践</text>

            <circle cx="200" cy="337" r="26" fill="url(#nodeGrad)" stroke="#C4B28A" stroke-width="1.2"/>
            <text x="200" y="334" text-anchor="middle" font-size="10" fill="#262522" font-family="Noto Serif SC">个人札记</text>
            <text x="200" y="346" text-anchor="middle" font-size="8" fill="#777" font-family="Inter">疑问·灵感</text>
          </g>
        </svg>
      </div>
    </div>

    <!-- 模态：分享 -->
    <div id="shareOverlay" class="fixed inset-0 z-40 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center px-6">
      <div class="w-full max-w-sm rounded-3xl bg-parchment shadow-soft border border-black/10 px-4 pt-4 pb-5">
        <div class="flex items-center justify-between mb-2">
          <p class="serif text-[16px] font-semibold text-ink">分享这条笔记</p>
          <button id="shareClose" class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-black/5 hover:bg-black/10">
            <i data-lucide="x" class="w-3.5 h-3.5 text-ink/80"></i>
          </button>
        </div>
        <p class="text-[11px] text-ink/60 mb-2">长按可复制，也可以直接截图发送给朋友。</p>
        <div id="shareContent" class="serif text-[12px] leading-[1.6] text-ink/90 rounded-2xl bg-white/80 border border-black/5 px-3 py-3 max-h-64 overflow-y-auto"></div>
        <div class="mt-3 flex justify-end gap-2 text-[11px]">
          <button id="shareCopyButton" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-full border border-black/10 bg-white/80 hover:bg-white">
            <i data-lucide="clipboard" class="w-3.5 h-3.5"></i>
            <span>复制文本</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 模态：笔记全屏查看 / 编辑 -->
    <div id="noteDetailOverlay" class="fixed inset-0 z-40 hidden bg-black/65 backdrop-blur-sm flex flex-col">
      <div class="flex items-center justify-between px-5 pt-5 pb-2 text-white">
        <div>
          <p class="serif text-[18px] font-semibold leading-tight">笔记详情</p>
          <p id="noteDetailBook" class="text-[11px] text-white/70 mt-0.5"></p>
        </div>
        <button id="noteDetailClose" class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-white/10 hover:bg-white/20">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div class="flex-1 flex flex-col px-4 pb-6">
        <div class="flex items-center justify-between text-[11px] text-white/75 mb-2 px-1">
          <span id="noteDetailTime"></span>
          <span id="noteDetailType"></span>
        </div>
        <div class="flex-1 flex flex-col rounded-3xl bg-parchment shadow-card border border-white/15 overflow-hidden">
          <div class="px-4 pt-3 pb-2 border-b border-black/10">
            <p class="text-[11px] text-ink/60 mb-1">原文摘录</p>
            <textarea id="noteDetailExcerpt" class="w-full bg-transparent border-none outline-none resize-none text-[12px] leading-[1.6] serif text-ink/90 max-h-32"></textarea>
          </div>
          <div class="px-4 pt-2 pb-3 flex-1 flex flex-col">
            <p class="text-[11px] text-ink/60 mb-1">AI 逻辑拆解 / 发散</p>
            <textarea id="noteDetailContent" class="flex-1 w-full bg-transparent border-none outline-none resize-none text-[12px] leading-[1.6] serif text-ink/90"></textarea>
          </div>
        </div>
        <div class="mt-3 flex justify-between items-center">
          <button id="noteDetailDelete" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-full border border-red-300/80 bg-red-50/70 text-[11px] text-red-700 hover:bg-red-100">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
            <span>删除</span>
          </button>
          <button id="noteDetailSave" class="inline-flex items-center gap-1 px-4 py-1.5 rounded-full bg-accentStrong text-[11px] text-white shadow-subtle">
            <i data-lucide="save" class="w-3.5 h-3.5"></i>
            <span>保存修改</span>
          </button>
        </div>
      </div>
    </div>

    <!-- 模态：二次确认（删除书 / 清空等） -->
    <div id="confirmOverlay" class="fixed inset-0 z-40 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center px-6">
      <div class="w-full max-w-xs rounded-3xl bg-parchment shadow-soft border border-black/10 px-4 pt-4 pb-5">
        <p id="confirmTitle" class="serif text-[16px] font-semibold text-ink mb-1.5"></p>
        <p id="confirmBody" class="text-[12px] text-ink/75 mb-3"></p>
        <div class="flex justify-end gap-2 text-[12px]">
          <button id="confirmCancel" class="px-3 py-1.5 rounded-full border border-black/10 bg-white/80 hover:bg-white">再想想</button>
          <button id="confirmOk" class="px-3 py-1.5 rounded-full bg-red-500 text-white hover:bg-red-600">确认</button>
        </div>
      </div>
    </div>

    <!-- 轻量提示气泡 -->
    <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-24 z-50 px-3.5 py-2 rounded-full bg-ink/90 text-[11px] text-white shadow-card hidden"></div>
  </div>

  <script>
    // ===================== 工具函数 =====================
    const qs = (sel) => document.querySelector(sel);
    const qsa = (sel) => Array.from(document.querySelectorAll(sel));

    function showToast(message, duration = 1800) {
      const toast = qs('#toast');
      toast.textContent = message;
      toast.classList.remove('hidden');
      Velocity(toast, { translateY: -8, opacity: 1 }, { duration: 200, easing: 'easeOutQuad' });
      setTimeout(() => {
        Velocity(toast, { translateY: 0, opacity: 0 }, {
          duration: 200,
          easing: 'easeInQuad',
          complete: () => toast.classList.add('hidden')
        });
      }, duration);
    }

    function formatDateTime(d = new Date()) {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function generateId(prefix) {
      return prefix + '_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
    }

    // ===================== 状态管理 =====================
    const state = {
      view: 'camera', // 'camera' | 'library' | 'notebook'
      hasCapture: false,
      lastCaptureDataUrl: null,
      currentDrawer: null, // {mode, excerpt, content, bookName}
      currentBookName: '未命名书页',
      selectionTextMock: '',
      uploadTimer: null,
      confirmCallback: null,
      editingNoteId: null,
    };

    const STORAGE_KEYS = {
      books: 'readwithme_books',
      notes: 'readwithme_notes',
    };

    function loadFromStorage(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) || typeof parsed === 'object' ? parsed : fallback;
      } catch {
        return fallback;
      }
    }

    function saveToStorage(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch(e) {
        console.warn('Storage failed', e);
        showToast('存储空间有限，部分数据可能无法保存。', 2500);
      }
    }

    function getBooks() {
      return loadFromStorage(STORAGE_KEYS.books, []);
    }

    function setBooks(list) {
      saveToStorage(STORAGE_KEYS.books, list);
      renderBooks();
      refreshNoteFilterOptions();
    }

    function getNotes() {
      return loadFromStorage(STORAGE_KEYS.notes, []);
    }

    function setNotes(list) {
      saveToStorage(STORAGE_KEYS.notes, list);
      renderNotes();
      refreshNoteBadge();
    }

    // ===================== 相机逻辑 =====================
    async function initCamera() {
      const statusEl = qs('#cameraStatus');
      try {
        statusEl.textContent = '正在启动相机…';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false,
        });
        const video = qs('#cameraVideo');
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          video.play();
          statusEl.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block mr-1 animate-pulse"></span> 相机已就绪';
        };
      } catch (e) {
        console.error(e);
        statusEl.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-400 inline-block mr-1"></span> 无法访问相机，请检查浏览器权限。';
        showToast('无法访问相机，请在浏览器中授予权限。', 3000);
      }
    }

    function captureFrame() {
      const video = qs('#cameraVideo');
      const canvas = qs('#captureCanvas');
      const rect = video.getBoundingClientRect();
      canvas.width = video.videoWidth || rect.width;
      canvas.height = video.videoHeight || rect.height;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      state.lastCaptureDataUrl = canvas.toDataURL('image/jpeg', 0.85);

      // UI 切换
      state.hasCapture = true;
      canvas.classList.remove('hidden');
      qs('#termRadarLayer').classList.remove('hidden');
      qs('#selectionLayer').classList.remove('hidden');

      // 底部按钮切换
      qs('#captureButton').classList.add('hidden');
      qs('#postCaptureActions').classList.remove('hidden');

      // 术语雷达生成
      spawnTermDots();

      showToast('已捕捉当前书页，可以开始划线了。');
    }

    function resetCapture() {
      state.hasCapture = false;
      state.lastCaptureDataUrl = null;
      qs('#captureCanvas').classList.add('hidden');
      qs('#termRadarLayer').classList.add('hidden');
      qs('#selectionLayer').classList.add('hidden');
      qs('#captureButton').classList.remove('hidden');
      qs('#postCaptureActions').classList.add('hidden');
      clearTermDots();
      hideSelectionMenu();
    }

    // ===================== 术语雷达 =====================
    const TERMS = [
      { title: '核心概念', body: '这是本页反复出现的关键词，理解它有助于把握整章的主线。' },
      { title: '隐含前提', body: '作者在这里默认了一些没有明说的条件，可以尝试把它们写出来。' },
      { title: '关键转折', body: '这一句往往是论证结构的拐点，前后逻辑可能出现立场变化。' },
      { title: '方法论线索', body: '这里提供了一种可迁移的方法，试着想想能否应用到别的学科。' },
      { title: '可疑之处', body: '如果你对此处论证不完全信服，可以用不同角度去挑战它。' },
    ];

    function spawnTermDots() {
      const layer = qs('#termRadarLayer');
      clearTermDots();

      const count = 3 + Math.floor(Math.random() * 3); // 3~5
      const rect = layer.getBoundingClientRect();
      const frag = document.createDocumentFragment();

      for (let i = 0; i < count; i++) {
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.className = 'term-dot pointer-events-auto absolute w-6 h-6 rounded-full bg-accentSoft border border-accentStrong/60';
        const x = 15 + Math.random() * 70; // 百分比
        const y = 20 + Math.random() * 60;
        dot.style.left = x + '%';
        dot.style.top = y + '%';
        dot.dataset.termIndex = String(i % TERMS.length);

        dot.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const { clientX, clientY } = ev;
          showTermTooltip(clientX, clientY, TERMS[dot.dataset.termIndex]);
        });

        frag.appendChild(dot);
        Velocity(dot, { scale: [1, 0.4], opacity: [1, 0] }, {
          duration: 380,
          easing: 'easeOutBack',
          delay: 60 * i,
        });
      }

      layer.appendChild(frag);
    }

    function clearTermDots() {
      const layer = qs('#termRadarLayer');
      layer.innerHTML = '';
    }

    let termTooltipTimer = null;
    function showTermTooltip(x, y, term) {
      const tooltip = qs('#termTooltip');
      qs('#termTitle').textContent = term.title;
      qs('#termBody').textContent = term.body;
      tooltip.style.left = x + 'px';
      tooltip.style.top = (y - 70) + 'px';
      tooltip.classList.remove('hidden');
      tooltip.style.opacity = 0;
      Velocity(tooltip, { opacity: 1, translateY: -4 }, { duration: 180, easing: 'easeOutQuad' });

      clearTimeout(termTooltipTimer);
      termTooltipTimer = setTimeout(() => {
        Velocity(tooltip, { opacity: 0, translateY: 0 }, {
          duration: 160,
          complete: () => tooltip.classList.add('hidden'),
        });
      }, 2600);
    }

    // ===================== 划线选择 =====================
    const selectionState = {
      active: false,
      longPressTimer: null,
      startX: 0,
      startY: 0,
      isTouch: false,
    };

    function attachSelectionHandlers() {
      const layer = qs('#selectionLayer');

      const start = (clientX, clientY, isTouch) => {
        selectionState.isTouch = isTouch;
        selectionState.longPressTimer && clearTimeout(selectionState.longPressTimer);
        selectionState.longPressTimer = setTimeout(() => {
          selectionState.active = true;
          selectionState.startX = clientX;
          selectionState.startY = clientY;
          showSelectionRect(clientX, clientY, clientX, clientY);
        }, 450);
      };

      const move = (clientX, clientY) => {
        if (!selectionState.active) return;
        showSelectionRect(selectionState.startX, selectionState.startY, clientX, clientY);
      };

      const end = (clientX, clientY) => {
        clearTimeout(selectionState.longPressTimer);
        if (!selectionState.active) return;
        selectionState.active = false;
        // 模拟选中一段文字，实际上根据位置随机给一段提示
        state.selectionTextMock = '选中了一小段本页文字内容（示意）。';
        showSelectionMenu(clientX, clientY);
      };

      layer.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        start(e.clientX, e.clientY, false);
      });
      window.addEventListener('mousemove', (e) => {
        if (selectionState.longPressTimer || selectionState.active) {
          move(e.clientX, e.clientY);
        }
      });
      window.addEventListener('mouseup', (e) => {
        end(e.clientX, e.clientY);
      });

      layer.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const t = e.touches[0];
        start(t.clientX, t.clientY, true);
      }, { passive: false });

      layer.addEventListener('touchmove', (e) => {
        if (!selectionState.active && !selectionState.longPressTimer) return;
        const t = e.touches[0];
        move(t.clientX, t.clientY);
      }, { passive: false });

      layer.addEventListener('touchend', (e) => {
        const t = e.changedTouches[0];
        end(t.clientX, t.clientY);
      });
    }

    function showSelectionRect(x1, y1, x2, y2) {
      const rectEl = qs('#selectionRect');
      const layer = qs('#selectionLayer');
      const bounds = layer.getBoundingClientRect();
      const left = Math.min(x1, x2) - bounds.left;
      const top = Math.min(y1, y2) - bounds.top;
      const width = Math.abs(x1 - x2);
      const height = Math.abs(y1 - y2);
      rectEl.style.left = left + 'px';
      rectEl.style.top = top + 'px';
      rectEl.style.width = Math.max(width, 32) + 'px';
      rectEl.style.height = Math.max(height, 18) + 'px';
      rectEl.classList.remove('hidden');
    }

    function showSelectionMenu(x, y) {
      const menu = qs('#selectionMenu');
      const layer = qs('#selectionLayer');
      const bounds = layer.getBoundingClientRect();
      const left = x - bounds.left - 40;
      const top = y - bounds.top - 44;
      menu.style.left = Math.max(8, Math.min(bounds.width - 90, left)) + 'px';
      menu.style.top = Math.max(8, top) + 'px';
      menu.classList.remove('hidden');
      Velocity(menu, { scale: [1, 0.8], opacity: [1, 0] }, { duration: 180, easing: 'easeOutBack' });
    }

    function hideSelectionMenu() {
      const rectEl = qs('#selectionRect');
      const menu = qs('#selectionMenu');
      rectEl.classList.add('hidden');
      menu.classList.add('hidden');
    }

    // ===================== 抽屉逻辑 =====================
    function openDrawer(mode, options = {}) {
      state.currentDrawer = { mode, ...options };
      const titleEl = qs('#drawerTitle');
      const subEl = qs('#drawerSubTitle');
      const metaBook = qs('#drawerBookName');
      const metaTime = qs('#drawerTimestamp');
      const contentEl = qs('#drawerContent');

      const now = new Date();
      const timeStr = formatDateTime(now);
      metaTime.textContent = timeStr;

      let title = '';
      let sub = '';
      let content = '';
      let bookName = options.bookName || state.currentBookName || '未命名书页';

      if (mode === 'pageSummary') {
        title = '这页大概在讲什么？';
        sub = '基于你当前这一页，为你拆出阅读抓手。';
        content = generatePageSummaryText();
      } else if (mode === 'analysis') {
        title = '拆解一下这段话';
        sub = '帮你把选中的内容拆成更容易复述的逻辑链。';
        content = generateAnalysisText(state.selectionTextMock);
      } else if (mode === 'divergent') {
        title = '从这里往外发散';
        sub = '根据选中部分，尝试做一点跨章节 / 跨学科联想。';
        content = generateDivergentText(state.selectionTextMock);
      }

      state.currentDrawer = {
        ...state.currentDrawer,
        bookName,
        excerpt: options.excerpt || state.selectionTextMock || '本页截图中的选定片段（示意）。',
        content,
        createdAt: timeStr,
      };

      titleEl.textContent = title;
      subEl.textContent = sub;
      metaBook.textContent = bookName;
      contentEl.innerHTML = content.replace(/\n/g, '<br/>');

      const backdrop = qs('#drawerBackdrop');
      const panel = qs('#drawerPanel');
      backdrop.classList.remove('hidden');
      panel.style.opacity = 0;
      panel.style.transform = 'translateY(100%)';
      Velocity(panel, { translateY: 0, opacity: 1 }, { duration: 260, easing: 'easeOutQuad' });
    }

    function closeDrawer() {
      const backdrop = qs('#drawerBackdrop');
      const panel = qs('#drawerPanel');
      Velocity(panel, { translateY: 40, opacity: 0 }, {
        duration: 210,
        easing: 'easeInQuad',
        complete: () => {
          backdrop.classList.add('hidden');
        },
      });
    }

    function generatePageSummaryText() {
      return [
        '① 这页更像是“本章的一个小结”。可以先用一句话复述：作者试图解决什么问题？',
        '',
        '② 尝试顺着结构走一遍：',
        '   - 第一段：通常在界定背景或提出一个看似“常识”的观点；',
        '   - 中间段落：通过一个或两个小例子，把抽象观点落到具体情境；',
        '   - 最后一句：往往藏着“本页真正想留给你的句子”（可以单独划线）。',
        '',
        '③ 如果要把这一页讲给朋友听，你可以只保留：',
        '   - 一个关键词；',
        '   - 一个关键转折句；',
        '   - 一个你愿意亲身试一试的小方法。',
      ].join('\n');
    }

    function generateAnalysisText(selection) {
      return [
        `【你选中的内容】`,
        selection || '（示意文本）',
        '',
        '【逻辑拆解试读】',
        '1. 先找“结论句”：如果把这一段倒着读，最后一句通常是作者真正想说的结论；',
        '2. 然后向前追溯：在结论前，作者给出了哪些支撑它的理由、例子或对比？',
        '3. 把这些理由按“因为……所以……”串一次，看看有没有隐含前提没被提到；',
        '4. 如果你不同意它，可以尝试从“前提不成立 / 论证不充分 / 结论跳跃”三种角度挑一处发问。',
      ].join('\n');
    }

    function generateDivergentText(selection) {
      return [
        `【从这里向外发散】`,
        selection || '（示意文本）',
        '',
        '① 把这段话换一个领域重讲：如果这是一本讲经济学的书，你能否把同样的结构套到心理学、历史或你熟悉的专业里？',
        '',
        '② 想一个“极端反例”：如果作者说的全部都不成立，现实世界会变成什么样？这种夸张思考，往往能帮你更清晰地看到它的适用边界。',
        '',
        '③ 留下一句自己的“边注”：用 1～2 句话记录：这段话最打动你 / 最困扰你 / 最想验证的一点是什么。',
      ].join('\n');
    }

    // ===================== 收藏逻辑 =====================
    function favoriteCurrentDrawer() {
      if (!state.currentDrawer) {
        showToast('没有可收藏的内容。');
        return;
      }
      const notes = getNotes();
      const note = {
        id: generateId('note'),
        bookName: state.currentDrawer.bookName || '未命名书页',
        excerpt: state.currentDrawer.excerpt || '本页截图中的一小段文字（示意）',
        content: state.currentDrawer.content || '',
        type: state.currentDrawer.mode || 'analysis',
        createdAt: state.currentDrawer.createdAt || formatDateTime(),
      };
      notes.unshift(note);
      setNotes(notes);
      flyToNotebookIcon();
      showToast('已收藏到阅读笔记本。');
    }

    function flyToNotebookIcon() {
      const button = qs('#drawerFavoriteButton');
      const notebook = qs('#notebookButton');
      const rectFrom = button.getBoundingClientRect();
      const rectTo = notebook.getBoundingClientRect();
      const ghost = document.createElement('div');
      ghost.className = 'fixed z-[60] w-7 h-7 rounded-full bg-accentSoft border border-accentStrong/60 flex items-center justify-center';
      ghost.innerHTML = '<i data-lucide="bookmark" class="w-3.5 h-3.5 text-accentStrong"></i>';
      document.body.appendChild(ghost);
      lucide.createIcons(ghost);

      ghost.style.left = rectFrom.left + rectFrom.width / 2 - 14 + 'px';
      ghost.style.top = rectFrom.top + rectFrom.height / 2 - 14 + 'px';

      const dx = rectTo.left + rectTo.width / 2 - (rectFrom.left + rectFrom.width / 2);
      const dy = rectTo.top + rectTo.height / 2 - (rectFrom.top + rectFrom.height / 2);

      Velocity(ghost, { translateX: dx, translateY: dy, scale: 0.4, opacity: 0.2 }, {
        duration: 500,
        easing: 'easeInOutQuad',
        complete: () => ghost.remove(),
      });
    }

    function refreshNoteBadge() {
      const notes = getNotes();
      const badge = qs('#noteBadge');
      if (notes.length === 0) {
        badge.classList.add('hidden');
      } else {
        badge.textContent = notes.length > 99 ? '99+' : String(notes.length);
        badge.classList.remove('hidden');
      }
    }

    // ===================== 书架渲染 & 管理 =====================
    function renderBooks() {
      const container = qs('#bookList');
      const emptyHint = qs('#emptyBookHint');
      const books = getBooks();
      container.innerHTML = '';

      if (!books.length) {
        emptyHint.classList.remove('hidden');
        return;
      }
      emptyHint.classList.add('hidden');

      const frag = document.createDocumentFragment();

      books.forEach(book => {
        const item = document.createElement('div');
        item.className = 'group relative rounded-2xl bg-white/80 border border-black/8 shadow-card px-4 py-3 flex items-start gap-3 overflow-hidden';
        item.dataset.id = book.id;

        item.innerHTML = `
          <div class="mt-0.5">
            <div class="w-9 h-12 rounded-lg bg-accentSoft border border-accent/40 flex items-center justify-center shadow-subtle">
              <i data-lucide="book-open" class="w-4 h-4 text-accentStrong"></i>
            </div>
          </div>
          <div class="flex-1 min-w-0">
            <p class="serif text-[14px] font-semibold text-ink truncate">${book.name}</p>
            <p class="text-[11px] text-ink/55 mt-0.5">${book.createdAt || ''}</p>
            <div class="mt-1.5 flex items-center gap-2">
              ${book.uploading ? `
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-black/4 text-[10px] text-ink/70 border border-black/8">
                  <span class="w-1.5 h-1.5 rounded-full bg-accentStrong animate-ping"></span>
                  <span>正在处理文件…</span>
                </span>
              ` : `
                <button class="view-mindmap text-[11px] inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-accentStrong text-white shadow-subtle">
                  <i data-lucide="share-2" class="w-3.5 h-3.5"></i>
                  <span>查看导图</span>
                </button>
              `}
            </div>
          </div>
          <button class="absolute right-3 top-3 opacity-0 group-hover:opacity-100 transition-opacity delete-book">
            <i data-lucide="trash-2" class="w-3.5 h-3.5 text-red-500/80"></i>
          </button>
        `;

        // 长按删除
        let longPressTimer = null;
        item.addEventListener('touchstart', () => {
          longPressTimer = setTimeout(() => confirmDeleteBook(book.id, book.name), 700);
        }, { passive: true });
        item.addEventListener('touchend', () => clearTimeout(longPressTimer));

        item.querySelector('.delete-book').addEventListener('click', (e) => {
          e.stopPropagation();
          confirmDeleteBook(book.id, book.name);
        });

        const mindmapBtn = item.querySelector('.view-mindmap');
        if (mindmapBtn) {
          mindmapBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openMindmapOverlay(book.name);
          });
        }

        frag.appendChild(item);
      });

      container.appendChild(frag);
      lucide.createIcons(container);
    }

    function confirmDeleteBook(id, name) {
      openConfirm({
        title: '删除这本书？',
        body: `将会移除「${name}」及其自动生成的导图记录，不影响你的笔记。`,
        onConfirm: () => {
          const books = getBooks().filter(b => b.id !== id);
          setBooks(books);
          showToast('已从书架中移除。');
        },
      });
    }

    function handleUploadFile(file) {
      if (!file) return;
      const ext = (file.name.split('.').pop() || '').toLowerCase();
      if (!['pdf', 'epub'].includes(ext)) {
        showToast('仅支持 PDF 或 EPUB 文件。');
        return;
      }

      const uploadContainer = qs('#uploadProgressContainer');
      const uploadFileName = qs('#uploadFileName');
      const uploadPercent = qs('#uploadPercent');
      const uploadBar = qs('#uploadBar');

      uploadContainer.classList.remove('hidden');
      uploadFileName.textContent = file.name;
      uploadPercent.textContent = '0%';
      uploadBar.style.width = '0%';

      const books = getBooks();
      const id = generateId('book');
      const book = {
        id,
        name: file.name.replace(/\.[^.]+$/, ''),
        createdAt: formatDateTime(),
        uploading: true,
      };
      books.unshift(book);
      setBooks(books);

      let progress = 0;
      state.uploadTimer && clearInterval(state.uploadTimer);
      state.uploadTimer = setInterval(() => {
        progress += 8 + Math.random() * 10;
        if (progress >= 100) {
          progress = 100;
          clearInterval(state.uploadTimer);
          setTimeout(() => {
            uploadContainer.classList.add('hidden');
          }, 500);

          const updated = getBooks().map(b => b.id === id ? { ...b, uploading: false } : b);
          setBooks(updated);
          showToast('文件处理完成，导图已生成。');
        }
        uploadPercent.textContent = `${Math.floor(progress)}%`;
        uploadBar.style.width = `${progress}%`;
      }, 260);
    }

    function cancelUpload() {
      if (state.uploadTimer) {
        clearInterval(state.uploadTimer);
        state.uploadTimer = null;
      }
      qs('#uploadProgressContainer').classList.add('hidden');
      showToast('已取消上传。');
    }

    // ===================== 导图 Overlay =====================
    function openMindmapOverlay(bookName) {
      const overlay = qs('#mindmapOverlay');
      const title = qs('#mindmapTitle');
      title.textContent = `《${bookName}》 · 导图视图`;
      overlay.classList.remove('hidden');
      Velocity(overlay, { opacity: [1, 0] }, { duration: 200, easing: 'easeOutQuad' });
    }

    function closeMindmapOverlay() {
      const overlay = qs('#mindmapOverlay');
      Velocity(overlay, { opacity: 0 }, {
        duration: 180,
        easing: 'easeInQuad',
        complete: () => overlay.classList.add('hidden'),
      });
    }

    // ===================== 笔记渲染 & 交互 =====================
    function renderNotes() {
      const listEl = qs('#noteList');
      const emptyHint = qs('#emptyNoteHint');
      const filterValue = qs('#noteFilterSelect').value;
      const notes = getNotes();
      listEl.innerHTML = '';

      let filtered = notes;
      if (filterValue !== '__all__') {
        filtered = notes.filter(n => n.bookName === filterValue);
      }

      if (!filtered.length) {
        emptyHint.classList.remove('hidden');
        return;
      }
      emptyHint.classList.add('hidden');

      const frag = document.createDocumentFragment();
      filtered.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note-card relative bg-white/90 border border-black/8 rounded-2xl shadow-card px-3.5 py-3 overflow-hidden active:shadow-none';
        card.dataset.id = note.id;

        card.innerHTML = `
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0">
              <p class="text-[11px] text-ink/55 mb-0.5 truncate">${note.bookName}</p>
              <p class="serif text-[13px] text-ink/90 line-clamp-3">${note.content}</p>
            </div>
            <div class="flex flex-col items-end gap-2">
              <span class="text-[9px] text-ink/50 uppercase tracking-[0.18em]">${note.type === 'divergent' ? 'DIVERGE' : note.type === 'pageSummary' ? 'SUMMARY' : 'ANALYZE'}</span>
              <button class="delete-btn inline-flex items-center justify-center w-7 h-7 rounded-full bg-red-50 border border-red-200 text-red-600 opacity-0 group-hover:opacity-100 md:opacity-100">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>
          <div class="mt-2.5 flex items-center justify-between text-[10px] text-ink/55">
            <span>${note.createdAt}</span>
            <div class="flex items-center gap-1.5">
              <button class="share-btn inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-black/5 text-[10px] hover:bg-black/10">
                <i data-lucide="share" class="w-3 h-3"></i>
                <span>分享</span>
              </button>
              <span class="px-1.5 py-0.5 rounded-full bg-accentSoft/70 text-[9px] text-accentStrong">${note.bookName.slice(0, 5)}</span>
            </div>
          </div>
        `;

        // 点击进入详情
        card.addEventListener('click', (e) => {
          const isButton = e.target.closest('button');
          if (isButton) return;
          openNoteDetail(note);
        });

        // 删除按钮
        card.querySelector('.delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteNoteById(note.id);
        });

        // 分享按钮
        card.querySelector('.share-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          openShareOverlay(note);
        });

        // 左滑删除（移动端）
        attachSwipeToDelete(card, note.id);

        frag.appendChild(card);
      });

      listEl.appendChild(frag);
      lucide.createIcons(listEl);
    }

    function attachSwipeToDelete(cardEl, noteId) {
      let startX = 0;
      let currentX = 0;
      let swiping = false;

      cardEl.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        startX = e.touches[0].clientX;
        swiping = true;
      }, { passive: true });

      cardEl.addEventListener('touchmove', (e) => {
        if (!swiping) return;
        currentX = e.touches[0].clientX;
        const deltaX = currentX - startX;
        if (deltaX < 0) {
          cardEl.style.transform = `translateX(${Math.max(deltaX, -80)}px)`;
        }
      }, { passive: true });

      cardEl.addEventListener('touchend', () => {
        if (!swiping) return;
        const deltaX = currentX - startX;
        if (deltaX < -60) {
          deleteNoteById(noteId);
        } else {
          cardEl.style.transform = 'translateX(0)';
        }
        swiping = false;
      });
    }

    function deleteNoteById(id) {
      const notes = getNotes().filter(n => n.id !== id);
      setNotes(notes);
      showToast('已删除这条笔记。');
    }

    function openShareOverlay(note) {
      const overlay = qs('#shareOverlay');
      const content = qs('#shareContent');
      const text = [
        `《${note.bookName}》中的一则阅读笔记`,
        '',
        '【原文摘录】',
        note.excerpt,
        '',
        '【我的理解】',
        note.content,
        '',
        `记录于：${note.createdAt}`,
      ].join('\n');
      content.textContent = text;
      overlay.classList.remove('hidden');
      Velocity(overlay, { opacity: [1, 0] }, { duration: 180, easing: 'easeOutQuad' });

      qs('#shareCopyButton').onclick = async () => {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            showToast('已复制到剪贴板。');
          } else {
            showToast('当前环境不支持一键复制，请手动长按选择。', 2600);
          }
        } catch {
          showToast('复制失败，请手动选择文本。', 2600);
        }
      };
    }

    function closeShareOverlay() {
      const overlay = qs('#shareOverlay');
      Velocity(overlay, { opacity: 0 }, {
        duration: 160,
        easing: 'easeInQuad',
        complete: () => overlay.classList.add('hidden'),
      });
    }

    function openNoteDetail(note) {
      state.editingNoteId = note.id;
      const overlay = qs('#noteDetailOverlay');
      qs('#noteDetailBook').textContent = `来自：《${note.bookName}》`;
      qs('#noteDetailTime').textContent = note.createdAt;
      qs('#noteDetailType').textContent = note.type === 'divergent' ? '发散型笔记' : note.type === 'pageSummary' ? '页摘要笔记' : '分析型笔记';
      qs('#noteDetailExcerpt').value = note.excerpt;
      qs('#noteDetailContent').value = note.content;

      overlay.classList.remove('hidden');
      Velocity(overlay, { opacity: [1, 0] }, { duration: 200, easing: 'easeOutQuad' });
    }

    function closeNoteDetailOverlay() {
      const overlay = qs('#noteDetailOverlay');
      Velocity(overlay, { opacity: 0 }, {
        duration: 180,
        easing: 'easeInQuad',
        complete: () => overlay.classList.add('hidden'),
      });
      state.editingNoteId = null;
    }

    function saveNoteDetail() {
      if (!state.editingNoteId) return;
      const excerpt = qs('#noteDetailExcerpt').value.trim();
      const content = qs('#noteDetailContent').value.trim();
      const notes = getNotes().map(n => n.id === state.editingNoteId ? { ...n, excerpt, content } : n);
      setNotes(notes);
      showToast('笔记已更新。');
      closeNoteDetailOverlay();
    }

    function deleteNoteFromDetail() {
      if (!state.editingNoteId) return;
      openConfirm({
        title: '删除这条笔记？',
        body: '删除后无法恢复，但不影响你的书架与其他笔记。',
        onConfirm: () => {
          deleteNoteById(state.editingNoteId);
          closeNoteDetailOverlay();
        },
      });
    }

    function refreshNoteFilterOptions() {
      const select = qs('#noteFilterSelect');
      const books = getBooks();
      const current = select.value;
      const options = ['<option value="__all__">全部书籍</option>'].concat(
        books.map(b => `<option value="${b.name}">${b.name}</option>`)
      );
      select.innerHTML = options.join('');
      if (books.some(b => b.name === current) || current === '__all__') {
        select.value = current;
      }
    }

    // ===================== 通用确认框 =====================
    function openConfirm({ title, body, onConfirm }) {
      const overlay = qs('#confirmOverlay');
      qs('#confirmTitle').textContent = title;
      qs('#confirmBody').textContent = body;
      state.confirmCallback = onConfirm;
      overlay.classList.remove('hidden');
      Velocity(overlay, { opacity: [1, 0] }, { duration: 160, easing: 'easeOutQuad' });
    }

    function closeConfirm() {
      const overlay = qs('#confirmOverlay');
      Velocity(overlay, { opacity: 0 }, {
        duration: 140,
        easing: 'easeInQuad',
        complete: () => overlay.classList.add('hidden'),
      });
      state.confirmCallback = null;
    }

    // ===================== 视图切换 =====================
    function switchView(view) {
      state.view = view;
      qs('#cameraView').classList.toggle('hidden', view !== 'camera');
      qs('#libraryView').classList.toggle('hidden', view !== 'library');
      qs('#notebookView').classList.toggle('hidden', view !== 'notebook');

      if (view === 'camera') {
        qs('#topBar').classList.remove('hidden');
      } else {
        qs('#topBar').classList.remove('hidden');
      }
    }

    // ===================== 初始化 =====================
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      initCamera();
      attachSelectionHandlers();
      renderBooks();
      renderNotes();
      refreshNoteFilterOptions();
      refreshNoteBadge();

      // 初始提示
      setTimeout(() => {
        showToast('长按书页截图并拖动，即可唤出分析菜单。', 2600);
      }, 1200);

      // 相机按钮
      qs('#captureButton').addEventListener('click', captureFrame);
      qs('#retakeButton').addEventListener('click', resetCapture);
      qs('#whatThisPageButton').addEventListener('click', () => openDrawer('pageSummary'));

      // 长按菜单 -> 分析 / 发散
      qs('#menuAnalyze').addEventListener('click', () => {
        openDrawer('analysis');
        hideSelectionMenu();
      });
      qs('#menuExpand').addEventListener('click', () => {
        openDrawer('divergent');
        hideSelectionMenu();
      });

      // 抽屉按钮
      qs('#drawerClose').addEventListener('click', closeDrawer);
      qs('#drawerBackdrop').addEventListener('click', closeDrawer);
      qs('#drawerFavoriteButton').addEventListener('click', favoriteCurrentDrawer);

      // 底部导航
      qs('#shelfButton').addEventListener('click', () => {
        switchView('library');
      });
      qs('#notebookButton').addEventListener('click', () => {
        switchView('notebook');
      });
      qs('#libraryBack').addEventListener('click', () => switchView('camera'));
      qs('#notebookBack').addEventListener('click', () => switchView('camera'));

      // 上传
      qs('#fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        e.target.value = '';
        handleUploadFile(file);
      });
      qs('#uploadCancel').addEventListener('click', cancelUpload);

      // 导图 overlay
      qs('#mindmapClose').addEventListener('click', closeMindmapOverlay);

      // 分享 overlay
      qs('#shareClose').addEventListener('click', closeShareOverlay);
      qs('#shareOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'shareOverlay') closeShareOverlay();
      });

      // 笔记详情 overlay
      qs('#noteDetailClose').addEventListener('click', closeNoteDetailOverlay);
      qs('#noteDetailSave').addEventListener('click', saveNoteDetail);
      qs('#noteDetailDelete').addEventListener('click', deleteNoteFromDetail);
      qs('#noteDetailOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'noteDetailOverlay') closeNoteDetailOverlay();
      });

      // 确认框
      qs('#confirmCancel').addEventListener('click', closeConfirm);
      qs('#confirmOk').addEventListener('click', () => {
        if (typeof state.confirmCallback === 'function') {
          state.confirmCallback();
        }
        closeConfirm();
      });

      // 笔记筛选
      qs('#noteFilterSelect').addEventListener('change', renderNotes);

      // 清空全部笔记
      qs('#clearNotesButton').addEventListener('click', () => {
        const notes = getNotes();
        if (!notes.length) {
          showToast('当前没有笔记。');
          return;
        }
        openConfirm({
          title: '清空所有笔记？',
          body: '这将删除本地保存的全部阅读笔记，操作不可撤销。',
          onConfirm: () => {
            setNotes([]);
            showToast('已清空全部笔记。');
          },
        });
      });

      // 使用提示按钮
      const infoButton = qs('#infoButton');
      if (infoButton) {
        infoButton.addEventListener('click', () => {
          showToast('提示：长按截图并略微拖动手指，即可唤出分析 / 发散菜单。', 3200);
        });
      }
    });
  </script>
</body>
</html>
